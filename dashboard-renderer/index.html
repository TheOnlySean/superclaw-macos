<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperClaw</title>
  <base href="./">
  <link rel="icon" href="./assets/superclaw-icon.png" type="image/png">
  <!-- SuperClaw: 微信ログイン不要のため SDK を削除 -->
  <script type="module" crossorigin src="./assets/e-BOOjGo6C.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/c-BFcIb6QC.js">
  <link rel="stylesheet" crossorigin href="./assets/a-CG9QQGJt.css">
</head>
<body>
  <!-- 载入页：Vue 挂载後にスクリプトで非表示。日文のみ。 -->
  <div id="superclaw-loading" style="position:fixed;inset:0;z-index:999998;background:linear-gradient(165deg,#0f0f1a 0%,#1a1a2e 50%,#16213e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;">
    <div style="width:80px;height:80px;margin-bottom:24px;border-radius:20px;background:linear-gradient(145deg,#2d2d44,#1e1e2e);box-shadow:0 8px 32px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;overflow:hidden;">
      <img src="./assets/superclaw-icon.png" alt="SuperClaw" style="width:56px;height:56px;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
      <span style="display:none;font-size:40px;line-height:1;">🦞</span>
    </div>
    <h1 style="margin:0 0 8px;font-size:22px;font-weight:600;color:#e8e8ee;letter-spacing:-0.02em;">SuperClaw</h1>
    <p style="margin:0 0 28px;font-size:14px;color:#9090a0;">コントロールパネルを読み込み中、しばらくお待ちください…</p>
    <div class="superclaw-loading-dots" style="display:flex;gap:8px;align-items:center;">
      <span style="width:8px;height:8px;border-radius:50%;background:#6b8cce;animation:superclaw-bounce 1.4s ease-in-out infinite both;"></span>
      <span style="width:8px;height:8px;border-radius:50%;background:#6b8cce;animation:superclaw-bounce 1.4s ease-in-out 0.2s infinite both;"></span>
      <span style="width:8px;height:8px;border-radius:50%;background:#6b8cce;animation:superclaw-bounce 1.4s ease-in-out 0.4s infinite both;"></span>
    </div>
    <style>
      @keyframes superclaw-bounce {
        0%,80%,100% { transform: scale(0.6); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </div>
  <!-- SuperClaw: エラー時は白画面に表示（F12 で DevTools） -->
  <div id="superclaw-error-overlay" style="display:none;position:fixed;inset:0;z-index:999999;background:#1a1a1a;color:#ff6b6b;font-family:monospace;font-size:12px;padding:16px;overflow:auto;white-space:pre-wrap;word-break:break-all;box-sizing:border-box;"></div>
  <script>
    (function(){
      var el = document.getElementById('superclaw-error-overlay');
      function show(msg) {
        if (!el) return;
        el.textContent = (el.textContent ? el.textContent + '\n\n---\n\n' : '') + msg;
        el.style.display = 'block';
      }
      window.onerror = function(m, s, line, col, err) {
        show('[onerror] ' + (m || '') + (s ? ' at ' + s + ':' + line + ':' + (col||'') : '') + (err && err.stack ? '\n' + err.stack : ''));
        return false;
      };
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          show('[load] ' + (e.target.src || e.target.href || '') + ' failed: ' + (e.message || ''));
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        show('[unhandledrejection] ' + (e.reason && (e.reason.message || e.reason) || String(e.reason)));
      });
    })();
  </script>
  <div id="app"></div>
  <!-- SuperClaw: ブランド統一・WeChat非表示・OpenClaw 接続表示 -->
  <script>
    (function(){
      function hideLoginWx() {
        function walk(el) {
          if (!el || el.nodeType !== 1) return;
          var t = el.textContent && el.textContent.trim();
          if (t === 'Login' || t === '登录' || t.indexOf('微信') >= 0 || (el.id === 'wx_login') || (el.className && String(el.className).indexOf('wx_login') >= 0)) {
            var p = el.closest && el.closest('[class*="sidebar"], [class*="footer"], [class*="bottom"], .wx_page, .qrcode-card');
            if (p) p.style.setProperty('display', 'none', 'important');
            else el.style.setProperty('display', 'none', 'important');
          }
          for (var i = 0; i < (el.childNodes && el.childNodes.length) || 0; i++) walk(el.childNodes[i]);
        }
        walk(document.body);
      }
      function qclawToSuperclaw() {
        var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        var nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function(n){
          if (n.nodeValue && (n.nodeValue.indexOf('Qclaw') >= 0 || n.nodeValue.indexOf('QClaw') >= 0))
            n.nodeValue = n.nodeValue.replace(/\bQclaw\b/gi, 'SuperClaw').replace(/\bQClaw\b/g, 'SuperClaw');
        });
      }
      function ensureOpenClawStatusDiv() {
        var id = 'superclaw-openclaw-status';
        var div = document.getElementById(id);
        if (!div) {
          div = document.createElement('div');
          div.id = id;
          div.style.cssText = 'position:fixed;bottom:12px;left:12px;z-index:99998;font-size:11px;color:#888;background:rgba(0,0,0,.6);padding:6px 10px;border-radius:8px;font-family:system-ui,sans-serif;max-width:320px;';
          document.body.appendChild(div);
        }
        return div;
      }
      function updateOpenClawStatusBar(gatewayRunning, state) {
        var div = ensureOpenClawStatusDiv();
        if (!gatewayRunning) {
          div.innerHTML = '<strong style="color:#e09d6d;">接続: 未接続</strong><br>' +
            'OpenClaw を起動してください（ポート 18789）。<br>メイン画面で「インストール」を実行済みか確認してください。';
          return;
        }
        var sessions = (state && state.sessions) ? state.sessions : [];
        var model = (state && state.defaultModel) ? state.defaultModel : '';
        div.innerHTML = '<strong style="color:#aaa;">接続: ローカル OpenClaw</strong><br>' +
          'セッション: ' + sessions.length + ' 件' + (model ? '<br>モデル: ' + model : '');
      }
      function injectOpenClawStatus(state) {
        updateOpenClawStatusBar(true, state);
      }
      function pollGatewayAndUpdateStatus() {
        var api = window.electronAPI;
        if (!api || !api.process || !api.process.getStatus) return;
        api.process.getStatus().then(function(res){
          if (res && res.status === 'stopped') {
            updateOpenClawStatusBar(false);
          } else if (res && res.status === 'running' && api.openclaw && api.openclaw.getShellState) {
            api.openclaw.getShellState().then(function(s){ updateOpenClawStatusBar(true, s); }).catch(function(){});
          }
        }).catch(function(){});
      }
      var _ce = console.error;
      console.error = function() {
        var msg = (arguments[0] && String(arguments[0])) || '';
        if (msg.indexOf('18789') >= 0 || msg.indexOf('ERR_CONNECTION_REFUSED') >= 0 || (msg.indexOf('WebSocket') >= 0 && msg.indexOf('failed') >= 0)) {
          updateOpenClawStatusBar(false);
        }
        return _ce.apply(console, arguments);
      };
      function onReady() {
        hideLoginWx();
        qclawToSuperclaw();
        var api = window.electronAPI;
        if (api && api.process && api.process.getStatus) {
          pollGatewayAndUpdateStatus();
          setInterval(pollGatewayAndUpdateStatus, 4000);
        }
        if (api && api.openclaw && api.openclaw.getShellState) {
          api.openclaw.getShellState().then(function(s){
            window.__openclawShellState = s;
            api.process.getStatus().then(function(res){
              updateOpenClawStatusBar(res && res.status === 'running', s);
            }).catch(function(){ updateOpenClawStatusBar(true, s); });
          }).catch(function(){});
        }
      }
      function hideLoadingWhenReady() {
        var loading = document.getElementById('superclaw-loading');
        var app = document.getElementById('app');
        if (!loading || !app) return false;
        var hasContent = app.children.length > 0 || (app.innerHTML && app.innerHTML.trim().length > 0);
        if (hasContent) { loading.style.display = 'none'; return true; }
        return false;
      }
      function showLoadingError() {
        var wrap = document.getElementById('superclaw-loading');
        if (!wrap) return;
        var msg = document.getElementById('superclaw-loading-err');
        if (msg) return;
        msg = document.createElement('div');
        msg.id = 'superclaw-loading-err';
        msg.style.cssText = 'margin-top:24px;text-align:center;color:#e09d6d;font-size:13px;max-width:280px;';
        msg.innerHTML = '読み込みに失敗しました。<br>ネットワークと OpenClaw の起動を確認し、<button type="button" style="margin-top:12px;padding:8px 16px;background:#4a6ba8;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">再読み込み</button>';
        msg.querySelector('button').onclick = function(){ location.reload(); };
        wrap.appendChild(msg);
      }
      document.addEventListener('DOMContentLoaded', function() {
        onReady();
        setTimeout(onReady, 500);
        setTimeout(onReady, 2000);
        setInterval(hideLoadingWhenReady, 500);
        setTimeout(function(){
          var el = document.getElementById('superclaw-loading');
          var app = document.getElementById('app');
          if (el && app && app.innerHTML.trim().length === 0) showLoadingError();
          else if (el) el.style.display = 'none';
        }, 12000);
        var rafId = 0;
        var obs = new MutationObserver(function() {
          if (rafId) return;
          rafId = requestAnimationFrame(function() {
            rafId = 0;
            qclawToSuperclaw();
            hideLoginWx();
          });
        });
        obs.observe(document.body, { childList: true, subtree: true });
      });
    })();
  </script>
</body>
</html>
