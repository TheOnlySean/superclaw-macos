<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SuperClaw セットアップ (Safe Mode)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>SuperClaw セットアップ</h1>
    <p class="hint">Apple Silicon 安定モードで起動しています。</p>

    <section class="card">
      <h2>1) 準備チェック</h2>
      <button id="btn-check">チェックを実行</button>
      <pre id="check-out" class="out"></pre>
    </section>

    <section class="card">
      <h2>2) インストール</h2>
      <button id="btn-install">インストールを開始</button>
      <pre id="install-out" class="out"></pre>
    </section>

    <section class="card row">
      <button id="btn-dashboard">SuperClaw を使い始める</button>
      <button id="btn-open-license">ライセンス購入ページを開く</button>
    </section>
  </main>
  <script src="renderer.js"></script>
</body>
</html>
